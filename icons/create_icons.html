<!DOCTYPE html>
<html><body>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  
  // Background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  
  // Speed icon (play triangle)
  ctx.fillStyle = '#00d4ff';
  ctx.beginPath();
  ctx.moveTo(s * 0.2, s * 0.2);
  ctx.lineTo(s * 0.55, s * 0.42);
  ctx.lineTo(s * 0.2, s * 0.65);
  ctx.closePath();
  ctx.fill();
  
  // Music note (pitch)
  ctx.fillStyle = '#ff6b9d';
  ctx.beginPath();
  ctx.arc(s * 0.6, s * 0.72, s * 0.09, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(s * 0.67, s * 0.3, s * 0.04, s * 0.43);
  ctx.fillRect(s * 0.67, s * 0.3, s * 0.18, s * 0.04);
  ctx.fillRect(s * 0.81, s * 0.3, s * 0.04, s * 0.15);
  ctx.beginPath();
  ctx.arc(s * 0.82, s * 0.48, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  
  return canvas.toDataURL('image/png');
}

['c48','c128'].forEach(id => {
  const c = document.getElementById(id);
  const url = drawIcon(c);
  const a = document.createElement('a');
  a.href = url;
  a.download = `icon${c.width}.png`;
  a.textContent = `Download icon${c.width}.png`;
  document.body.appendChild(a);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body></html>
